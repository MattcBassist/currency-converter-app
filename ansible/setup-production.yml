---
- name: Configure Production Server for Kubernetes deployment
  hosts: localhost
  connection: local
  become: yes

  tasks:
    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - curl
          - apt-transport-https
          - ca-certificates
          - conntrack
        state: present

    - name: Install kubectl using snap
      command: snap install kubectl --classic
      args:
        creates: /snap/bin/kubectl

    - name: Download Minikube package
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube_latest_amd64.deb
        dest: /tmp/minikube_latest_amd64.deb
        mode: '0644'

    - name: Install Minikube
      apt:
        deb: /tmp/minikube_latest_amd64.deb

    - name: Start Minikube using Docker driver
      command: minikube start --driver=docker --force
      environment:
        CHANGE_MINIKUBE_NONE_USER: "true"

    - name: Apply Kubernetes deployment
      command: kubectl apply -f k8s/deployment.yaml
      args:
        chdir: "{{ playbook_dir }}/.."

    - name: Apply Kubernetes service
      command: kubectl apply -f k8s/service.yaml
      args:
        chdir: "{{ playbook_dir }}/.."

    - name: Scale deployment to 2 replicas
      command: kubectl scale deployment currency-converter-deployment --replicas=2
